<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Название страницы -->
    <title>Учебная практика - задача №3</title>
    
    <!-- Поключение файла со стилями -->
    <link rel="stylesheet" href="CSS/main.css">
</head>
<body>
    
    <!-- Шапка страницы -->
    <header>
        <h1>Кейс-задача №3</h1>
        <p class="case-name">Простой слайдер на JavaScript</p>
    </header>

    <!-- Слайдер с изображениями -->
    <div class="slider" id="slider">
        <img src="images/01.jpg" alt="Slide 01">
        <img src="images/02.jpg" alt="Slide 02">
        <img src="images/03.jpg" alt="Slide 03">
        <img src="images/04.jpg" alt="Slide 04">
        <img src="images/05.jpg" alt="Slide 05">
    </div>

    <!-- Кнопки управления слайдером и счётчик изображений -->
    <div class="controls">
        <button id="btnPrev">Назад</button>
        <p id="imgCount" class="counter"></p>
        <button id="btnNext">Вперёд</button>
    </div>

    <!-- Подключение JavaScript файла -->
    <script src="JS/main.js"></script>

</body>
</html>
